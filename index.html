<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting to New Portal...</title>
    <link rel="canonical" href="https://m11gj.github.io/shu-binran/">
    <script type="text/javascript">
      // 旧URL（jyouhou-binran）から新URL（shu-binran）へ、ハッシュを維持して転送
      var hash = window.location.hash;
      var newUrl = "https://m11gj.github.io/shu-binran/" + hash;
      window.location.replace(newUrl);
    </script>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f9fafb; color: #111827; }
      .container { text-align: center; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
      a { color: #127636; font-weight: 600; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <p>ポータルのURLが変更されました。自動的に転送します...</p>
      <p>転送されない場合は <a href="https://m11gj.github.io/shu-binran/">こちら</a> をクリックしてください。</p>
    </div>
  </body>
</html>
